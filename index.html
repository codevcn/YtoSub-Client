<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png?v=1" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=1" />
    <link rel="manifest" href="/site.webmanifest?v=1" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YtoSub</title>
    <style>
      /* ─── RocherColor for splash name (matches app logo font) ─── */
      @font-face {
        font-family: 'RocherColor';
        src: url('/assets/fonts/RocherColor/RocherColor-eaddc164.woff2') format('woff2');
        font-display: block;
      }

      /* ─── Splash overlay ─── */
      #waiting-screen--splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
        transition:
          opacity 0.48s ease,
          visibility 0.48s ease;
      }
      #waiting-screen--splash.is-hiding {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #waiting-screen--splash .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: splash-mount 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes splash-mount {
        from {
          opacity: 0;
          transform: scale(0.82) translateY(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* ─── Logo pill (YouTube shape → ytosub remix) ─── */
      /*
        YouTube = red pill + white play triangle
        ytosub  = dark pill + cyan glow border
                  left half  → play triangle  (signals: it's a video player)
                  right half → CC subtitle lines (signals: it's about subtitles)
                  The divider line splits the two worlds
      */
      #waiting-screen--splash .splash-pill {
        width: 100px;
        height: 70px;
        border-radius: 18px;
        background: #18181b;
        border: 2px solid #3cd1fe;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splash-glow 2.2s ease-in-out infinite;
      }
      @keyframes splash-glow {
        0%,
        100% {
          box-shadow: 0 0 18px 2px rgba(60, 209, 254, 0.22);
        }
        50% {
          box-shadow: 0 0 40px 8px rgba(60, 209, 254, 0.48);
        }
      }

      /* Subtitle lines scan in from right */
      #waiting-screen--splash .sl {
        transform: translateX(8px);
        opacity: 0;
      }
      #waiting-screen--splash .sl1 {
        animation: splash-scan 0.36s ease 0.28s forwards;
      }
      #waiting-screen--splash .sl2 {
        animation: splash-scan 0.36s ease 0.46s forwards;
      }
      #waiting-screen--splash .sl3 {
        animation: splash-scan 0.36s ease 0.64s forwards;
      }
      @keyframes splash-scan {
        from {
          opacity: 0;
          transform: translateX(8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ─── App name ─── */
      #waiting-screen--splash .splash-name {
        font-family: 'RocherColor', system-ui, sans-serif;
        font-size: 30px;
        color: #f4f4f5;
        line-height: 1;
        letter-spacing: 0.01em;
      }
      #waiting-screen--splash .splash-name .hl {
        color: #3cd1fe;
      }

      /* ─── Loading dots ─── */
      #waiting-screen--splash .splash-dots {
        display: flex;
        gap: 7px;
      }
      #waiting-screen--splash .splash-dots span {
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #3cd1fe;
        animation: splash-dot 1.4s ease-in-out infinite;
      }
      #waiting-screen--splash .splash-dots span:nth-child(1) {
        animation-delay: 0s;
      }
      #waiting-screen--splash .splash-dots span:nth-child(2) {
        animation-delay: 0.22s;
      }
      #waiting-screen--splash .splash-dots span:nth-child(3) {
        animation-delay: 0.44s;
      }
      @keyframes splash-dot {
        0%,
        70%,
        100% {
          opacity: 0.22;
          transform: scale(1);
        }
        35% {
          opacity: 1;
          transform: scale(1.6);
        }
      }

      /* ─── Dot-grid background (matches ErrorBoundary style) ─── */
      #waiting-screen--splash .splash-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.04;
        background-image:
          linear-gradient(#3cd1fe 1px, transparent 1px), linear-gradient(90deg, #3cd1fe 1px, transparent 1px);
        background-size: 48px 48px;
      }
    </style>
  </head>
  <body>
    <!-- ─── Splash screen — visible before React mounts ─── -->
    <div id="waiting-screen--splash" role="status" aria-label="Đang tải YtoSub...">
      <div class="splash-grid" aria-hidden="true"></div>

      <div class="splash-inner">
        <!--
          Logo concept:
            Left zone  = play triangle (video player DNA)
            Divider    = the arrow/transform moment  
            Right zone = CC-style subtitle lines (subtitle tool DNA)
          Together they "remix" the YouTube play-button into the ytosub brand.
        -->
        <div class="splash-pill">
          <svg
            width="78"
            height="52"
            viewBox="0 0 78 52"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <!-- Play triangle — left zone -->
            <polygon points="10,11 10,41 32,26" fill="#3cd1fe" />

            <!-- Divider -->
            <line x1="40" y1="8" x2="40" y2="44" stroke="#3cd1fe" stroke-width="1.2" stroke-opacity="0.28" />

            <!-- CC subtitle lines — right zone, scan in via CSS -->
            <rect class="sl sl1" x="46" y="17" width="24" height="4" rx="2" fill="#3cd1fe" fill-opacity="0.90" />
            <rect class="sl sl2" x="46" y="25" width="18" height="4" rx="2" fill="#3cd1fe" fill-opacity="0.62" />
            <rect class="sl sl3" x="46" y="33" width="21" height="4" rx="2" fill="#3cd1fe" fill-opacity="0.38" />
          </svg>
        </div>

        <div class="splash-name">yto<span class="hl">sub</span></div>

        <div class="splash-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      /* Remove splash once React has mounted children into #root */
      ;(function () {
        var splash = document.getElementById('waiting-screen--splash')
        var root = document.getElementById('root')
        if (!splash || !root) return

        function hideSplash() {
          splash.classList.add('is-hiding')
          setTimeout(function () {
            splash.remove()
          }, 500)
        }

        var observer = new MutationObserver(function () {
          if (root.firstChild) {
            observer.disconnect()
            hideSplash()
          }
        })
        observer.observe(root, { childList: true })

        /* Safety net: hide after 8 s even if React never mounts */
        setTimeout(function () {
          observer.disconnect()
          hideSplash()
        }, 8000)
      })()
    </script>
  </body>
</html>
